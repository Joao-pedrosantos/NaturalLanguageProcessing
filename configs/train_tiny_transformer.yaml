# Hiperparâmetros idênticos a train_tiny.yaml (mesmo lr, schedule, batch,
# steps), só muda o modelo e o diretório de saída. Isso garante que a
# diferença de resultado vem da arquitetura, não dos hiperparâmetros.

arch: transformer
model_config: configs/transformer_tiny.yaml
tokenizer: artifacts/tokenizer.json
out_dir: runs/transformer_tiny

# Data
seq_len: 256
alpha: 0.7
shuffle_buffer: 100

# Optim
learning_rate: 3.0e-4
min_lr_ratio: 0.1
weight_decay: 0.1
betas: [0.9, 0.95]
grad_clip: 1.0

# Schedule
warmup_steps: 100
total_steps: 1500

# Batch
batch_size: 32
grad_accum_steps: 1
num_workers: 4

# Logging / eval / ckpt
log_every: 25
eval_every: 150
eval_max_batches: 16
save_every: 500
keep_last_ckpts: 1

# Precisão
dtype: bfloat16
compile: true           # Transformer puro PyTorch compila bem

seed: 42
