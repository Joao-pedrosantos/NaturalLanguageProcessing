# Treino do xLSTM medium. Mesmos hiperparâmetros do tiny, exceto:
#   - total_steps: 2000 (mais dados, mais escala -> faz sentido treinar mais)
#   - warmup_steps: 200 (proporcional)
#   - eval_every: 200
#   - log_every: 20

arch: xlstm
model_config: configs/xlstm_medium.yaml
tokenizer: artifacts/tokenizer.json
out_dir: runs/xlstm_medium

# Data
seq_len: 256
alpha: 0.7
shuffle_buffer: 100

# Optim
learning_rate: 3.0e-4
min_lr_ratio: 0.1
weight_decay: 0.1
betas: [0.9, 0.95]
grad_clip: 1.0

# Schedule (estendido pra sair do regime undertrained: medium antes
# parava em best=final com 2000 steps; 4000 com warmup proporcional
# tira o platô sem sair do orçamento de minutos na GPU).
warmup_steps: 400
total_steps: 4000

# Batch (GPU desktop)
batch_size: 32
grad_accum_steps: 1
num_workers: 4

# Logging
log_every: 50
eval_every: 250
eval_max_batches: 16
save_every: 1000
keep_last_ckpts: 1

# Precisão
dtype: bfloat16
compile: false

seed: 42
