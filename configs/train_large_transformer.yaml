# Treino Transformer large na GPU. Mesmo schedule do xLSTM large pra
# manter a comparação justa (única variável: arch).

arch: transformer
model_config: configs/transformer_large.yaml
tokenizer: artifacts/tokenizer.json
out_dir: runs/transformer_large

seq_len: 512
alpha: 0.7
shuffle_buffer: 200

learning_rate: 6.0e-4
min_lr_ratio: 0.1
weight_decay: 0.1
betas: [0.9, 0.95]
grad_clip: 1.0

warmup_steps: 1000
total_steps: 12000

batch_size: 32
grad_accum_steps: 1
num_workers: 4

log_every: 50
eval_every: 500
eval_max_batches: 16
save_every: 1000
keep_last_ckpts: 2

dtype: bfloat16
compile: true   # Transformer puro PyTorch compila bem

seed: 42
