# Treino Transformer 100M na GPU. Mesmo schedule do xLSTM 100M para
# manter a comparação justa (única variável: arch).

arch: transformer
model_config: configs/transformer_100m.yaml
tokenizer: artifacts/tokenizer.json
out_dir: runs/transformer_100m

seq_len: 1024
alpha: 0.7
shuffle_buffer: 10000

learning_rate: 3.0e-4
min_lr_ratio: 0.1
weight_decay: 0.1
betas: [0.9, 0.95]
grad_clip: 1.0

warmup_steps: 2000
total_steps: 60000

batch_size: 16
grad_accum_steps: 2
num_workers: 2

log_every: 100
eval_every: 2000
eval_max_batches: 100
save_every: 5000
keep_last_ckpts: 3

dtype: bfloat16
compile: true

seed: 42
