# Idêntico a train_medium.yaml, exceto que aponta pro Transformer.

arch: transformer
model_config: configs/transformer_medium.yaml
tokenizer: artifacts/tokenizer.json
out_dir: runs/transformer_medium

seq_len: 256
alpha: 0.7
shuffle_buffer: 100

learning_rate: 3.0e-4
min_lr_ratio: 0.1
weight_decay: 0.1
betas: [0.9, 0.95]
grad_clip: 1.0

warmup_steps: 400
total_steps: 4000

batch_size: 32
grad_accum_steps: 1
num_workers: 4

log_every: 50
eval_every: 250
eval_max_batches: 16
save_every: 1000
keep_last_ckpts: 1

dtype: bfloat16
compile: true

seed: 42
