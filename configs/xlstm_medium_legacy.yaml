# Config que casa com runs/xlstm_medium/best.pt (CPU, vocab=4000, ctx=256).
# O configs/xlstm_medium.yaml "canônico" foi atualizado pra rodada GPU
# (vocab=8000, backend=cuda); este aqui é o snapshot do que foi treinado
# de fato e existe em disco.

vocab_size: 4000
embedding_dim: 256
num_blocks: 6
context_length: 256
slstm_at: [1]

mlstm_block:
  mlstm:
    conv1d_kernel_size: 4
    qkv_proj_blocksize: 4
    num_heads: 4

slstm_block:
  slstm:
    backend: vanilla
    num_heads: 4
    conv1d_kernel_size: 4
    bias_init: powerlaw_blockdependent
  feedforward:
    proj_factor: 1.3
    act_fn: gelu
