# Hiperparâmetros de treino mini para POC em notebook.
#
# Orçamento: 4 * 1 * 256 = 1024 tokens/step * 500 steps = ~500k tokens.
# Suficiente pra ver a loss descer num livro pequeno.

model_config: configs/xlstm_tiny.yaml
tokenizer: artifacts/tokenizer.json
out_dir: runs/xlstm_tiny
arch: xlstm

# Data
seq_len: 256
alpha: 0.7              # ignorado no train_local (uma língua só), mantido por compat
shuffle_buffer: 100

# Optim
learning_rate: 3.0e-4
min_lr_ratio: 0.1
weight_decay: 0.1
betas: [0.9, 0.95]
grad_clip: 1.0

# Schedule
warmup_steps: 100
total_steps: 1500

# Batch (GPU desktop)
batch_size: 32
grad_accum_steps: 1
num_workers: 4

# Logging / eval / ckpt
log_every: 25
eval_every: 150
eval_max_batches: 16
save_every: 500
keep_last_ckpts: 1

# Precisão
dtype: bfloat16         # GPU com bf16 nativo (RTX 5080)
compile: false          # xLSTM cuda backend não casa bem com torch.compile

seed: 42
