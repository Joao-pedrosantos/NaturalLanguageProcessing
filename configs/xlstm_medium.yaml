# xLSTM "medium": ~3-5M params, segunda escala pra construir scaling curve.
#
# Comparado ao tiny:
#   emb:    128 -> 256  (2x)
#   blocks:   4 ->   6  (1.5x)
# Resultado esperado: ~3-5M params (rode count_params pra confirmar).

vocab_size: 8000
embedding_dim: 256
num_blocks: 6
context_length: 256
slstm_at: [1]

mlstm_block:
  mlstm:
    conv1d_kernel_size: 4
    qkv_proj_blocksize: 4
    num_heads: 4

slstm_block:
  slstm:
    backend: vanilla   # cuda backend quebra no Windows com CUDA 12.x; vanilla roda na GPU via PyTorch puro.
    num_heads: 4
    conv1d_kernel_size: 4
    bias_init: powerlaw_blockdependent
  feedforward:
    proj_factor: 1.3
    act_fn: gelu
