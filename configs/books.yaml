# Lista de livros do Project Gutenberg usados pelo pipeline.
#
# Como adicionar mais livros (sem mexer em código):
#   1) Procure o livro em https://www.gutenberg.org/ebooks/ filtrando
#      por idioma "Portuguese".
#   2) O id é o número que aparece na URL do livro (ex.: 55752).
#   3) Adicione uma entrada no bloco `train` abaixo. Não precisa rodar
#      mais nada — `prepare_books.py` é idempotente; só baixa o que
#      ainda não está em artifacts/train_books/.
#
# Mantenha o holdout disjunto do treino (não duplique título). Se trocar
# o holdout, lembre que isso muda os números da Tabela 1 e Figura 1.
#
# Todos os IDs aqui foram verificados manualmente no catálogo do PG
# em 2026-04-28. Veja PROJECT_NOTES.md para a história do bug do
# o_cortico.txt (id 43011 era um livro infantil em inglês mal-rotulado).

