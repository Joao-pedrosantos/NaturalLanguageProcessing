# Treino xLSTM 100M na GPU. Usa o pipeline de streaming Wikipedia
# (vocab=32k, ctx=1024) — o corpus literário de ~1.9M tokens é
# insuficiente pra escala de 100M (ratio Chinchilla ficaria <0.02 e o
# modelo decoraria o corpus em ~1 epoch).
#
# Token budget reasoning (approx):
#   batch_size * grad_accum * seq_len = tokens per step
#   16 * 2 * 1024 = 32_768 tokens/step
#   60_000 steps ≈ 1.97B tokens ≈ Chinchilla ~20:1 para 100M params.

arch: xlstm
model_config: configs/xlstm_100m.yaml
tokenizer: artifacts/tokenizer.json
out_dir: runs/xlstm_100m

# Data
seq_len: 1024
alpha: 0.7
shuffle_buffer: 10000

# Optim
learning_rate: 3.0e-4
min_lr_ratio: 0.1
weight_decay: 0.1
betas: [0.9, 0.95]
grad_clip: 1.0

# Schedule
warmup_steps: 2000
total_steps: 60000

# Batch
batch_size: 16
grad_accum_steps: 2
num_workers: 2

# Logging
log_every: 100
eval_every: 2000
eval_max_batches: 100
save_every: 5000
keep_last_ckpts: 3

# Precisão
dtype: bfloat16
compile: false   # xlstm cuda backend não casa com torch.compile

seed: 42
